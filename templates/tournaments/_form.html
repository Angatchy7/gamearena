<div class="card shadow-sm">
    <div class="card-body">

        {% csrf_token %}

        {% for field in form %}

        <div class="mb-3">

            <label class="form-label">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
            <div class="text-danger small">
                {{ field.errors }}
            </div>
            {% endif %}

        </div>

        {% endfor %}

        <button type="submit" class="btn btn-primary">
            Save Tournament
        </button>

    </div>
</div>
